<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Shubham Yadav</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <!-- Self-contained on purpose: served straight from public/, no bundled assets. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #08090c; color-scheme: dark; }
    body {
      min-height: 100svh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 26px; text-align: center; padding: 24px;
      background: radial-gradient(ellipse at 50% 40%, #101218 0%, #08090c 70%);
      color: #eceae2;
      font-family: "Space Grotesk", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .code {
      font-family: "Anton", Impact, sans-serif;
      font-size: clamp(120px, 30vw, 320px);
      line-height: 0.9;
      color: transparent;
      -webkit-text-stroke: 2px #eceae2;
      letter-spacing: 0.02em;
      position: relative;
    }
    .code::after {
      content: "404";
      position: absolute; inset: 0;
      -webkit-text-stroke: 0;
      color: #4fe0ff;
      clip-path: inset(38% 0 38% 0);
      transform: translateX(6px);
      opacity: 0.9;
    }
    p { color: #9aa0ab; font-size: clamp(15px, 2vw, 19px); }
    p em { font-family: "Instrument Serif", Georgia, serif; font-style: italic; color: #4fe0ff; }
    a {
      display: inline-flex; align-items: center; gap: 10px;
      min-height: 48px; padding: 14px 30px; border-radius: 999px;
      border: 1px solid rgba(236, 234, 226, 0.4);
      color: #eceae2; text-decoration: none;
      font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
      transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }
    a:hover, a:focus-visible { border-color: #4fe0ff; color: #4fe0ff; transform: translateY(-2px); outline: none; }
    .ruler {
      position: fixed; left: 0; right: 0; bottom: 26px;
      font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(154, 160, 171, 0.55);
    }
  </style>
</head>
<body>
  <div class="code" aria-hidden="true">404</div>
  <p>This scene didn't make <em>the final cut.</em></p>
  <a href="/">&#8592; Back to the reel</a>
  <div class="ruler">SHUBHAM YADAV — BUILT WITH CODE, SOLD WITH STORIES</div>
</body>
</html>
